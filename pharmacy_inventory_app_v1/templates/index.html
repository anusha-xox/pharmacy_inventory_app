<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pharmacy Inventory</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">Hospital Inventory System</p>
        <h1>Pharmacy Inventory</h1>
      </div>
      <select id="roleSelect" class="role-select">
        <option value="admin">Admin</option>
        <option value="desk">Desk Personnel</option>
      </select>
    </header>

    <section id="adminView" class="view">
      <div class="cards">
        <article class="metric-card"><span>Total Medicines</span><strong id="totalMedicines">0</strong></article>
        <article class="metric-card"><span>Today's Sales</span><strong id="todaySales">₹0</strong></article>
        <article class="metric-card"><span>Today's Bills</span><strong id="todayBills">0</strong></article>
      </div>

      <nav class="tabs">
        <button class="tab active" data-tab="adminDashboard">Dashboard</button>
        <button class="tab" data-tab="addMedicine">Add Medicine</button>
        <button class="tab" data-tab="addStock">Add Stock</button>
        <button class="tab" data-tab="alerts">Alerts</button>
      </nav>

      <section id="adminDashboard" class="panel tab-panel active">
        <div class="section-head">
          <h2>Inventory</h2>
          <input id="adminSearch" placeholder="Search medicine" />
        </div>
        <div id="medicineList" class="list"></div>
      </section>

      <section id="addMedicine" class="panel tab-panel">
        <h2>Add Medicine</h2>
        <form id="medicineForm" class="form-grid">
          <input name="name" placeholder="Medicine name *" required />
          <input name="strength" placeholder="Strength e.g. 500mg" />
          <input name="category" placeholder="Category e.g. Tablet" />
          <input name="manufacturer" placeholder="Brand / Manufacturer" />
          <input name="unit_price" type="number" step="0.01" placeholder="Unit price ₹ *" required />
          <input name="reorder_level" type="number" placeholder="Low stock level" value="10" />
          <button type="submit" class="primary full">Save Medicine</button>
        </form>
      </section>

      <section id="addStock" class="panel tab-panel">
        <h2>Add Stock / Batch</h2>
        <form id="stockForm" class="form-grid">
          <select name="medicine_id" id="stockMedicineSelect" required></select>
          <input name="batch_no" placeholder="Batch number *" required />
          <input name="quantity_available" type="number" placeholder="Quantity *" required />
          <input name="expiry_date" type="date" required />
          <input name="purchase_price" type="number" step="0.01" placeholder="Purchase price ₹" />
          <input name="supplier" placeholder="Supplier" />
          <button type="submit" class="primary full">Save Stock</button>
        </form>
      </section>

      <section id="alerts" class="panel tab-panel">
        <h2>Expiry & Low Stock Alerts</h2>
        <div id="alertsList" class="list"></div>
      </section>
    </section>

    <section id="deskView" class="view hidden">
      <div class="panel">
        <div class="section-head">
          <h2>New Bill</h2>
          <button id="clearCart" class="ghost">Clear</button>
        </div>
        <input id="deskSearch" placeholder="Search medicine by name / brand" />
        <div id="billingMedicineList" class="list compact"></div>
      </div>

      <div class="panel cart-panel">
        <h2>Cart</h2>
        <div id="cartList" class="list compact empty">No items added</div>
        <div class="total-row"><span>Total</span><strong id="cartTotal">₹0</strong></div>
        <button id="confirmBill" class="primary full">Confirm Sale</button>
      </div>

      <div id="billSuccess" class="success-card hidden"></div>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
